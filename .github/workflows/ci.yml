# =============================================================================
# CI/CD — Build, Lint, Type-Check & Deploy
# =============================================================================
#
# Runs on every PR and push to master/develop.
#   - PRs (any branch):  Test + lint + build
#   - Push to develop:   Test + lint + build (no deploy)
#   - Push to master:    Test + lint + build + deploy to Vercel production
#
# The deploy job only runs if the build job succeeds, so broken code never
# reaches production.
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}

      - name: Lint
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Type-check & Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || '' }}
          PR_REVIEWER_API_KEY: ${{ secrets.PR_REVIEWER_API_KEY || '' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci-build-placeholder' }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL || 'http://localhost:3000' }}
          GITHUB_APP_ID: ${{ secrets.GITHUB_APP_ID || '0' }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY || 'placeholder' }}
          GITHUB_WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET || 'placeholder' }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY || '' }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}

  deploy:
    name: Deploy to Vercel
    # Only runs after CI passes AND the push is to master
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          vercel pull \
            --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: |
          vercel build \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel deploy \
            --prebuilt \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --json | tee deploy-output.json

      - name: Extract & Comment Deployment URL
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let url = '';
            try {
              const output = JSON.parse(fs.readFileSync('deploy-output.json', 'utf8'));
              // Vercel JSON output: array of lines, or a single object
              const lines = Array.isArray(output) ? output : [output];
              const deployData = lines.find(l => l.url || l.alias);
              url = deployData?.alias?.[0] || deployData?.url || '';
            } catch (e) {
              console.log('Could not parse deploy output:', e.message);
            }

            if (url) {
              github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: `🚀 Deployed to Vercel: [${url}](${url})`
              });
            }

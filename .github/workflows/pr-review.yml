# =============================================================================
# PR Review CI — Automated AI Code Review via GitHub Actions
# =============================================================================
#
# Triggers an AI-powered code review on every pull request. Calls your
# deployed app's API to generate the review and posts the results as a
# formal PR check.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │ ⚠️  REQUIRED SECRETS (set in repo → Settings → Secrets → Actions)  │
# │                                                                     │
# │  PR_REVIEWER_URL      — Your deployed app URL                       │
# │                        (e.g. https://grokreview.railway.app)        │
# │                                                                     │
# │  PR_REVIEWER_API_KEY  — Matches the env var on your deployment      │
# │                        The API will reject requests without it.     │
# └─────────────────────────────────────────────────────────────────────┘
# =============================================================================

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, master, develop]

# Allow one concurrent review per PR
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'

    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Request AI Review
        id: review
        uses: fjogeleit/http-request-action@v1
        with:
          # PR_REVIEWER_URL must point to your deployed app (see secrets above)
          url: "${{ secrets.PR_REVIEWER_URL }}/api/github/ci-review"
          method: "POST"
          contentType: "application/json"
          customHeaders: >-
            {
              "Authorization": "Bearer ${{ secrets.PR_REVIEWER_API_KEY }}",
              "X-GitHub-Token": "${{ secrets.GITHUB_TOKEN }}"
            }
          data: >-
            {
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "prNumber": ${{ github.event.pull_request.number }},
              "title": "${{ github.event.pull_request.title }}",
              "headSha": "${{ github.sha }}"
            }

      - name: Post Review Comment
        if: steps.review.outcome == 'success' && steps.review.outputs.response != ''
        uses: actions/github-script@v7
        env:
          REVIEW_RESPONSE: ${{ steps.review.outputs.response }}
        with:
          script: |
            // Safely parse the JSON response (avoids injection issues)
            let response;
            try {
              response = JSON.parse(process.env.REVIEW_RESPONSE);
            } catch (e) {
              console.log('Failed to parse review response:', e.message);
              return;
            }

            if (!response || response.error) {
              console.log('Review failed:', response?.error);
              return;
            }

            const body = response.review || 'AI review completed.';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 GrokReview\n\n**Model:** ${response.model || 'default'}\n\n${body}\n\n---\n*Powered by GrokReview*`
            });

      - name: Set Check Status
        if: always()
        uses: actions/github-script@v7
        env:
          REVIEW_RESPONSE: ${{ steps.review.outputs.response }}
        with:
          script: |
            let conclusion = 'neutral';
            let summary = 'Review could not be completed.';

            if (process.env.REVIEW_RESPONSE) {
              try {
                const response = JSON.parse(process.env.REVIEW_RESPONSE);
                if (response) {
                  if (response.status === 'reviewed') {
                    conclusion = 'success';
                    summary = response.summary || 'Review completed successfully.';
                  } else if (response.status === 'failed') {
                    conclusion = 'failure';
                    summary = response.error || 'Review failed.';
                  } else if (response.status === 'no_changes') {
                    conclusion = 'skipped';
                    summary = 'No code changes to review.';
                  }
                }
              } catch (e) {
                console.log('Could not parse review response for status check:', e.message);
              }
            }

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'AI Code Review',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'AI Code Review',
                summary: summary.substring(0, 200),
                text: summary.substring(0, 60000)
              }
            });
